<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Semi-Dynamic Luxury Store</title>

<link rel="stylesheet" href="CSS/styles.css">

</head>

<body>

<header class="site-header">

<div class="header-inner">

<img src="Images/logo.png" class="logo">

</div>

</header>

<section class="hero">

<img src="Images/hero888.jpg" class="hero-img">

</section>

<main class="homepage">

<h2 class="section-title">Featured Products</h2>

<div class="row-wrapper">

<button class="row-arrow left" data-row="row1">❮</button>

<div class="product-row" id="row1"></div>

<button class="row-arrow right" data-row="row1">❯</button>

</div>

</main>

<footer class="site-footer">

<p>© 2026 Luxury Store</p>

</footer>

<!-- PRODUCT MODAL -->

<div id="productModal" class="modal">

<div class="modal-content">

<span class="close-modal">×</span>

<img id="modalImage">

<h3 id="modalTitle"></h3>

<p id="modalPrice"></p>

</div>

</div>

<script src="JS/main.js"></script>

</body>
</html>
