```html
<!DOCTYPE html>
<html lang="en">

<!-- ===================================================== -->
<!-- ======================= HEAD ======================== -->
<!-- ===================================================== -->

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AffilixS</title>

<link rel="stylesheet" href="CSS/styles.css">

</head>



<!-- ===================================================== -->
<!-- ======================= BODY ======================== -->
<!-- ===================================================== -->

<body>



<!-- ===================================================== -->
<!-- ======================= HEADER ====================== -->
<!-- ===================================================== -->

<header class="site-header">

<div class="logo">
<img src="images/logo.jpg" alt="AffilixS Logo">
</div>

<h1>AffilixS</h1>

</header>



<!-- ===================================================== -->
<!-- =============== FLOATING PREVIEW PANEL ============== -->
<!-- ===================================================== -->

<div id="floatingPreview">

<img id="previewImage" src="" alt="Product Preview">

</div>



<!-- ===================================================== -->
<!-- ================= CURSOR TOOLTIP ==================== -->
<!-- ===================================================== -->

<div id="cursor-info"></div>



<!-- ===================================================== -->
<!-- =================== PRODUCTS AREA =================== -->
<!-- ===================================================== -->

<section class="products-section">

<h2>Featured Products</h2>

<div class="product-row-wrapper">

<button class="row-arrow left" data-row="row1">❮</button>

<div class="product-row" id="row1"></div>

<button class="row-arrow right" data-row="row1">❯</button>

</div>

</section>



<!-- ===================================================== -->
<!-- ===================== PRODUCT MODAL ================= -->
<!-- ===================================================== -->

<div id="productModal" class="modal">

<div class="modal-box">

<span class="close-modal">×</span>

<img id="modalImage" src="" alt="Product Image">

<h2 id="modalTitle"></h2>

<p id="modalPrice"></p>

</div>

</div>



<!-- ===================================================== -->
<!-- ===================== JAVASCRIPT ==================== -->
<!-- ===================================================== -->

<script src="js/main.js"></script>



</body>
</html>
```
