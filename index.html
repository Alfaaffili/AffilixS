```html
<!DOCTYPE html>
<html lang="en">

<!-- ===================================================== -->
<!-- ======================= HEAD ======================== -->
<!-- ===================================================== -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AffilixS | Curated Discoveries</title>

<link rel="stylesheet" href="CSS/styles.css?v=3">

</head>


<!-- ===================================================== -->
<!-- ======================= BODY ======================== -->
<!-- ===================================================== -->

<body>


<!-- ===================================================== -->
<!-- ======================= HEADER ====================== -->
<!-- ===================================================== -->

<header class="site-header">

<div class="logo">
<img src="images/logo.jpg" alt="AffilixS Logo">
</div>

<h1>AffilixS</h1>

</header>



<!-- ===================================================== -->
<!-- ===================== HERO PANEL ==================== -->
<!-- ===================================================== -->

<section class="hero">

<img src="images/hero888.jpg" alt="Hero Image">

</section>



<!-- ===================================================== -->
<!-- =================== PRODUCTS AREA =================== -->
<!-- ===================================================== -->

<section class="products-section">

<h2>Featured Products</h2>

<div class="product-row-wrapper">

<button class="row-arrow left" data-row="row1">❮</button>

<div class="product-row" id="row1"></div>

<button class="row-arrow right" data-row="row1">❯</button>

</div>

</section>



<!-- ===================================================== -->
<!-- ==================== CATEGORIES ===================== -->
<!-- ===================================================== -->

<section class="categories">

<div class="category">Technology</div>
<div class="category">Home</div>
<div class="category">Fitness</div>
<div class="category">Style</div>
<div class="category">Beauty</div>

</section>



<!-- ===================================================== -->
<!-- ======================= FOOTER ====================== -->
<!-- ===================================================== -->

<footer>

<p>© 2026 AffilixS</p>

</footer>



<!-- ===================================================== -->
<!-- ====================== MODAL ======================== -->
<!-- ===================================================== -->

<div id="productModal" class="modal">

<div class="modal-box">

<span class="close-modal">×</span>

<img id="modalImage">

<h2 id="modalTitle"></h2>

<p id="modalPrice"></p>

</div>

</div>



<!-- ===================================================== -->
<!-- ===================== JAVASCRIPT ==================== -->
<!-- ===================================================== -->

<script src="js/main.js"></script>


</body>
</html>
```
