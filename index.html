<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AffilixS | Curated Discoveries</title>

<link rel="stylesheet" href="CSS/styles.css?v=10">

</head>


<body>


<!-- HEADER -->

<header class="site-header">

<div class="logo">
<img src="images/logo.jpg" alt="AffilixS Logo">
</div>

<h1>AffilixS</h1>

</header>



<!-- HERO -->

<section class="top-section">

<div class="identity-panel">

<div class="identity-text">
A refined selection for modern living.
</div>

</div>

</section>



<!-- PRODUCTS -->

<section class="products-section">

<h2>Featured Products</h2>

<div class="product-row-wrapper">

<button class="row-arrow left" data-row="row1">❮</button>

<div class="product-row" id="row1"></div>

<button class="row-arrow right" data-row="row1">❯</button>

</div>

</section>



<!-- FLOATING PREVIEW -->

<div id="floatingPreview">

<img id="previewImage">

</div>



<!-- PRODUCT MODAL -->

<div id="productModal" class="modal">

<div class="modal-box">

<span class="close-modal">×</span>

<img id="modalImage">

<h2 id="modalTitle"></h2>

<p id="modalPrice"></p>

</div>

</div>



<!-- CATEGORIES -->

<section class="categories">

<div class="category">
<img src="images/cat-tech.jpg">
<p>Technology</p>
</div>

<div class="category">
<img src="images/Home.jpg">
<p>Home & Living</p>
</div>

<div class="category">
<img src="images/Fittness.jpg">
<p>Fitness</p>
</div>

<div class="category">
<img src="images/Style.jpg">
<p>Style</p>
</div>

<div class="category">
<img src="images/BeautyPersonnalCare.jpg">
<p>Beauty</p>
</div>

</section>



<!-- FOOTER -->

<footer>

<p>© 2026 AffilixS</p>

</footer>



<!-- CACHE PROTECTION -->

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.getRegistrations().then(function(registrations) {
for (let registration of registrations) {
registration.unregister();
}
});
}

</script>


<script src="js/main.js?v=10"></script>

<div id="floatingPreview">
<img id="previewImage">
</div>

</body>
</html>
