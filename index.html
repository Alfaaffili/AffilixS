<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affilixs</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
<div class="logo">
<img src="images/logo.jpg" alt="Affilixs Logo">
</div>
<h1>Affilixs</h1>
</header>

<section class="products-section">

<h2>Featured Products</h2>

<div class="product-row-wrapper">

<button class="row-arrow left" data-row="row1">❮</button>

<div class="product-row" id="row1"></div>

<button class="row-arrow right" data-row="row1">❯</button>

</div>

</section>

<div id="productModal" class="modal">

<div class="modal-box">

<span class="close-modal">×</span>

<img id="modalImage">

<h2 id="modalTitle"></h2>

<p id="modalPrice"></p>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
