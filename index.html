<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affilixs</title>

<link rel="stylesheet" href="styles.css">
</head>


<body>


<!-- ================= HEADER ================= -->

<header class="site-header">

<div class="logo">
<img src="images/logo.jpg" alt="Affilixs Logo">
</div>

<h1>Affilixs</h1>

</header>



<!-- ================= PRODUCT SECTION ================= -->

<section class="products-section">

<h2>Featured Products</h2>

<div class="product-row-wrapper">

<button class="row-arrow left" data-row="row1">&#10094;</button>

<div class="product-row" id="row1">
<!-- products inserted here dynamically -->
</div>

<button class="row-arrow right" data-row="row1">&#10095;</button>

</div>

</section>



<!-- ================= PRODUCT MODAL ================= -->

<div id="productModal" class="modal">

<div class="modal-box">

<span class="close-modal">&times;</span>

<img id="modalImage" src="" alt="Product">

<h2 id="modalTitle"></h2>

<p id="modalPrice"></p>

</div>

</div>



<!-- ================= SCRIPTS ================= -->

<script src="main.js"></script>

</body>

</html>
