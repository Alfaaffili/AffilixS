<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AffilixS | Premium Product View</title>
    <link rel="stylesheet" href="CSS/styles.css?v=1.3">
</head>
<body class="product-page">

    <header class="site-header">
        <div class="logo-group">
            <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
            <h1>AffilixS</h1>
        </div>
        <nav class="header-nav">
            <a href="index.html" style="text-decoration:none; color:#fff;"><span>Home</span></a>
            <span>Vision</span>
            <span>Insights</span>
            <span>Contact</span>
        </nav>
    </header>

    <main>
        <section class="hero-display">
            <div class="hero-image-container">
                <img id="heroImage" src="" alt="Loading...">
            </div>
        </section>

        <section class="product-detail-bar">
            <div class="detail-item title-group">
                <h1 id="prodName">---</h1>
                <a id="buyNowBtn" href="#" target="_blank" class="buy-now-trigger" style="display:inline-block; margin-top:10px; background:#ff0000; color:#fff; padding:8px 20px; text-decoration:none; border-radius:4px; font-weight:bold; font-size:0.8rem;">BUY NOW</a>
            </div>

            <div class="detail-item description-box" id="prodDesc">
                Loading product insight...
            </div>

            <div class="detail-item stats-group">
                <div class="stat-row"><span>Rating:</span> <span class="stat-val" id="prodRating">---</span></div>
                <div class="stat-row"><span>Trend:</span> <span class="stat-val" id="prodTrend">---</span></div>
                <div class="stat-row"><span>Price:</span> <span class="stat-val" id="prodPrice">---</span></div>
            </div>
        </section>

        <section class="products-section">
            <h2>Similar Discoveries</h2>
            <div class="product-row-wrapper">
                <div id="similarProductsRow" class="similar-products-row">
                    </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <span>Privacy</span>
            <span>Disclaimer</span>
            <span>Contact</span>
        </div>
        <p class="copyright-text">&copy; 2026 AffilixS</p>
    </footer>

    <script>
        async function initProductPage() {
            try {
                const params = new URLSearchParams(window.location.search);
                const productId = params.get('id');
                const res = await fetch("Data/products.json?v=1.3.1");
                const allProducts = await res.json();
                const currentProduct = allProducts.find(p => p.id == productId);
                
                if (!currentProduct) {
                    window.location.href = 'index.html';
                    return;
                }

                // DATA INJECTION
                document.querySelector("#heroImage").src = currentProduct.image;
                document.querySelector("#prodName").textContent = currentProduct.name;
                
                // REPAIR: Use fullDescription from your JSON
                document.querySelector("#prodDesc").textContent = currentProduct.fullDescription || "No description available.";
                
                document.querySelector("#prodRating").textContent = currentProduct.rating || "4.8/5";
                document.querySelector("#prodTrend").textContent = currentProduct.trendScore ? currentProduct.trendScore + "%" : "Rising";
                document.querySelector("#prodPrice").textContent = (currentProduct.currency || "$") + currentProduct.price;
                document.querySelector("#buyNowBtn").href = currentProduct.affiliateLink || "#";

                // SIMILAR PRODUCTS LOGIC
                const similar = allProducts.filter(p => p.category === currentProduct.category && p.id !== currentProduct.id);
                renderSimilar(similar);
            } catch (e) { console.error(e); }
        }

        function renderSimilar(products) {
            const container = document.querySelector("#similarProductsRow");
            container.innerHTML = ""; 
            products.slice(0, 10).forEach(p => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.onclick = () => window.location.href = `product.html?id=${p.id}`;
                card.innerHTML = `
                    <img src="${p.image}" alt="${p.name}">
                    <div style="padding:12px;">
                        <h4 style="font-size:0.8rem; margin:0; color:#111; text-transform:uppercase;">${p.shortName || p.name}</h4>
                        <p style="color:#ff0000; font-weight:bold; margin:5px 0 0;">${p.currency || '$'}${p.price}</p>
                    </div>`;
                container.appendChild(card);
            });
        }
        document.addEventListener("DOMContentLoaded", initProductPage);
    </script>
</body>
</html>
