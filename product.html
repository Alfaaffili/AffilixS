<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AffilixS | Product View</title>
    <link rel="stylesheet" href="CSS/styles.css?v=1.4">
    <link rel="stylesheet" href="CSS/product-styles.css?v=1.1">
</head>
<body class="product-page">

<!-- [BLOCK: MODALS] -->
<div id="visionModal" class="text-modal" onclick="closeM(event, 'visionModal')"><div class="modal-box"><h2>Our Vision</h2><p>Refined products for modern living.</p></div></div>
<div id="contactModal" class="text-modal" onclick="closeM(event, 'contactModal')"><div class="modal-box"><h2>Contact</h2><p>support@affilixs.com</p></div></div>

<header class="site-header">
    <div class="logo-group" onclick="window.location.href='index.html'" style="cursor:pointer">
        <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
        <h1>AffilixS</h1>
    </div>
    <nav class="header-nav">
        <a href="index.html" class="nav-item">home</a>
        <span class="nav-item" onclick="openM('visionModal')">vision</span>
        <span class="nav-item" onclick="openM('contactModal')">contact</span>
    </nav>
</header>

<main class="product-main-layout">
    
    <!-- LEFT COLUMN -->
    <div class="main-display-area">
        <section class="hero-display">
            <img id="heroImage" src="" alt="Product Hero">
        </section>

        <section class="info-horizontal-bar">
            <div class="full-name-row"><b>FULL NAME:</b> <span id="pName">---</span></div>
            <div id="pDesc" class="description-text">---</div>
        </section>

        <div id="productRowsContainer"></div> 
    </div>

    <!-- RIGHT COLUMN -->
    <aside class="master-sidebar">
        <!-- Stats Box -->
        <div class="sidebar-action-col">
            <div class="tight-stats">
                <p><b>Rating:</b> ★★★★★</p>
                <p><b>Rank:</b> <span id="pRank">#1 Trend</span></p>
                <p><b>Price:</b> <span id="pPrice">---</span></p>
            </div>
            <div class="sidebar-btns">
                <a id="buyBtn" href="#" target="_blank" class="t-btn buy-now">BUY NOW</a>
                <button onclick="window.location.href='index.html'" class="t-btn go-back">BACK</button>
            </div>
        </div>

        <!-- Categories Box -->
        <div id="catOuterWrap">
            <div class="cat-scroll-track" id="catScrollInternal">
                <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/cat-tech.jpg"><p>TECH</p></div>
                <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/Home.jpg"><p>HOME</p></div>
                <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/Fittness.jpg"><p>FITNESS</p></div>
                <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/Style.jpg"><p>STYLE</p></div>
                <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/BeautyPersonnalCare.jpg"><p>BEAUTY</p></div>
            </div>
        </div>
    </aside>

</main>

<script>
    function openM(id) { document.getElementById(id).classList.add('active'); }
    function closeM(e, id) { if(e.target.id === id) document.getElementById(id).classList.remove('active'); }
    
    function updateHero(product) {
        document.getElementById("heroImage").src = product.image;
        document.getElementById("pName").innerText = product.name;
        document.getElementById("pDesc").innerText = product.fullDescription;
        document.getElementById("pPrice").innerText = (product.currency || "$") + product.price;
        document.getElementById("buyBtn").href = product.affiliateLink;
        
        // RULE: Follow the action (when product selected scroll window up)

        window.scrollTo({ top: 0, behavior: 'smooth' });

        const newUrl = window.location.pathname + '?id=' + product.id;
        window.history.pushState({path:newUrl},'',newUrl);
    }

    async function init() {
        try {
            const res = await fetch("Data/products.json?v=" + Date.now());
            const all = await res.json();
            const pId = new URLSearchParams(window.location.search).get('id');
            const p = all.find(x => x.id == pId) || all[0];

            updateHero(p);

            const container = document.getElementById("productRowsContainer");
            const similar = all.filter(x => x.category === p.category && x.id !== p.id);

            if (similar.length > 0) {
                container.innerHTML = `
                    <div class="row-wrapper">
                        <h2 class="row-title">Similar Discoveries</h2>
                        <div class="product-row" id="relRow"></div>
                        <!-- RED ARROWS -->

                        <button class="arrow-btn l" onclick="document.getElementById('relRow').scrollBy({left: -200, behavior: 'smooth'})">&lt;</button>

                        <button class="arrow-btn r" onclick="document.getElementById('relRow').scrollBy({left: 200, behavior: 'smooth'})">&gt;</button>
                    </div>`;

                const row = document.getElementById("relRow");
                similar.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "product-card";
                    card.innerHTML = `<img src="${item.image}"><div class="short-name">${item.shortName}</div>`;
                    card.onclick = () => updateHero(item);
                    row.appendChild(card);
                });
            }
        } catch (e) { console.error(e); }
    }
    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
