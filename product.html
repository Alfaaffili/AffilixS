<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AffilixS | Premium Product View</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="product-page">

    <header class="site-header">
        <div class="header-content">
            <div class="logo-group">
                <span class="logo-text">AffilixS</span>
            </div>
            <nav class="header-nav">
                <a href="index.html" style="text-decoration:none;"><span style="color:#fff;">Home</span></a>
                <span>Vision</span>
                <span>Insights</span>
                <span>Contact</span>
            </nav>
        </div>
    </header>

    <main class="product-container">
        <section id="main-product-view" class="hero-display">
            <div class="hero-image-container">
                <img id="main-img" src="" alt="Loading Product...">
            </div>
            <div class="hero-info-overlay">
                <h1 id="prod-name">---</h1>
                <p id="prod-brand">---</p>
                <div class="action-bar">
                    <span id="prod-price" class="premium-price">---</span>
                    <a id="buy-btn" href="#" target="_blank" class="buy-now-trigger">BUY NOW</a>
                </div>
            </div>
        </section>

        <section class="details-section">
            <div class="description-box">
                <h3>Editor's Insight</h3>
                <p id="full-desc">---</p>
            </div>
            <div class="specs-box">
                <h3>Specifications</h3>
                <ul id="specs-list" class="specs-list">
                    </ul>
            </div>
        </section>

        <section class="comparison-section">
            <h3 class="section-title">Explore Similar Picks</h3>
            <div id="sibling-row" class="product-row-wrapper">
                </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 AffilixS Premium Curations</p>
    </footer>

    <script src="js/product-logic.js"></script>
</body>
</html>
