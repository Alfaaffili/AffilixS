<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AffilixS | Product View</title>
    <!-- Main Stylesheet (Header/Footer) -->
    <link rel="stylesheet" href="CSS/styles.css?v=1.4">
    <!-- Product Specific Stylesheet (Layout) -->
    <link rel="stylesheet" href="CSS/product-styles.css?v=2.0">
</head>
<body class="product-page">

<!-- [BLOCK: MODALS] -->
<div id="visionModal" class="text-modal" onclick="closeM(event, 'visionModal')">
    <div class="modal-box"><h2>Our Vision</h2><p>Refined products for modern living.</p></div>
</div>
<div id="contactModal" class="text-modal" onclick="closeM(event, 'contactModal')">
    <div class="modal-box"><h2>Contact</h2><p>support@affilixs.com</p></div>
</div>

<header class="site-header">
    <div class="logo-group" onclick="window.location.href='index.html'" style="cursor:pointer">
        <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
        <h1>AffilixS</h1>
    </div>
    <nav class="header-nav">
        <a href="index.html" class="nav-item">home</a>
        <span class="nav-item" onclick="openM('visionModal')">vision</span>
        <span class="nav-item" onclick="openM('contactModal')">contact</span>
    </nav>
</header>

<main class="product-main-layout">
    
    <!-- LEFT SIDE: Stacks Hero, Description, and Row vertically -->
    <div class="main-display-area">
        
        <section class="hero-display">
            <img id="heroImage" src="" alt="Product Hero">
        </section>

        <!-- REPAIRED INFO SPACE: 4-Line Strategy -->
        <section class="info-horizontal-bar">
            <h2 class="row-title">PRODUCT DETAILS</h2> <!-- Line 1: Static Title -->

            <h3 id="pShortName" style="margin:0; font-size: 1.5rem; color: #666;">---</h3> <!-- Line 2: Short Name -->

            <h1 id="pFullName" style="margin:0; font-size: 1.5rem;">---</h1> <!-- Line 3: Long Name -->

            <div id="pDesc" class="description-text">---</div> <!-- Line 4: Full Description -->
        </section>

        <!-- Container for Similar Discoveries -->
        <div id="productRowsContainer"></div> 
        
    </div>

    <!-- RIGHT SIDE: Stats and Categories side-by-side -->
    <aside class="master-sidebar">

        <!-- Stats Box & Buttons (Uncomment when ready to restore) -->
         
        <div class="sidebar-action-col">
            <div class="tight-stats">
                <p><span>Rating:</span> <span>★★★★★</span></p>

                <p><span>Rank:</span> <span id="pRank">#1 Trend</span></p>

                <p><span>Price:</span> <span id="pPrice">---</span></p>
            </div>
            <div class="sidebar-btns">
                <a id="buyBtn" href="#" target="_blank" class="t-btn buy-now">BUY</a>
                <button onclick="window.location.href='index.html'" class="t-btn go-back">BACK</button>
            </div>
        </div> 
        

        <!-- Category Column -->
        <div class="cat-column">
            <div class="cat-square"><img src="images/cat-tech.jpg"><p>TECH</p></div>
            <div class="cat-square"><img src="images/Home.jpg"><p>HOME</p></div>
            <div class="cat-square"><img src="images/Style.jpg"><p>STYLE</p></div>
            <div class="cat-square"><img src="images/Fittness.jpg"><p>FITNESS</p></div>
            <div class="cat-square"><img src="images/BeautyPersonnalCare.jpg"><p>BEAUTY</p></div>
        </div>

    </aside>

</main>

<!-- HELPER SCRIPTS FOR MODALS -->
<script>
    function openM(id) { document.getElementById(id).classList.add('active'); }
    function closeM(e, id) { if(e.target.id === id) document.getElementById(id).classList.remove('active'); }
</script>

<!-- THE MAIN ENGINE: All data fetching and UI updates happen here -->
<script src="js/product-logic.js?v=999"></script>

</body>
</html>
