<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AffilixS | Product View</title>
    <link rel="stylesheet" href="CSS/styles.css?v=2.1">
</head>
<body class="product-page">

<header class="site-header">
    <div class="logo-group">
        <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
        <h1>AffilixS</h1>
    </div>
    <nav class="header-nav">
        <a href="index.html" style="text-decoration:none; color:inherit; font-size:0.85rem;">home</a>
    </nav>
</header>

<main class="product-main-layout">
    <div class="main-display-area">
        <section class="hero-display" style="display:flex; justify-content:center; align-items:center; background:#fff; border-radius:12px; height:45vh; overflow:hidden; border:1px solid #eee; margin-bottom:20px;">
            <img id="heroImage" src="" alt="Product Hero" style="max-width:95%; max-height:95%; object-fit:contain;">
        </section>

        <section class="info-horizontal-bar" style="background:#fff; border:1px solid #ddd; border-radius:8px; padding:15px; margin-bottom:20px;">
            <div style="font-size:13px;"><b>FULL NAME:</b> <span id="pName">---</span></div>
            <div style="font-size:12px; color:#555; margin-top:8px; line-height:1.5;" id="pDesc">---</div>
        </section>

        <div id="productRowsContainer"></div>
    </div>

    <aside class="master-sidebar">
        
        <div class="action-column">
            <div class="tight-stats">
                <p><b>Rate:</b> ★★★★★</p>
                <p><b>Rank:</b> #1 Trend</p>
                <p class="price-text">Price: <span id="pPrice">---</span></p>
            </div>
            <div class="button-stack">
                <a id="buyBtn" href="#" target="_blank" class="twin-btn buy">BUY NOW</a>
                <button onclick="window.location.href='index.html'" class="twin-btn back">GO BACK</button>
            </div>
        </div>

        <div class="category-column">
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/cat-tech.jpg"><p>TECH</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/Home.jpg"><p>HOME</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/Fittness.jpg"><p>FITNESS</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/Style.jpg"><p>STYLE</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/BeautyPersonnalCare.jpg"><p>BEAUTY</p></div>
        </div>
    </aside>
</main>

<footer class="site-footer">
    <div class="footer-links">
        <span onclick="openM('privacyModal')">Privacy</span>
        <span onclick="openM('disclaimerModal')">Disclaimer</span>
        <span onclick="openM('contactModal')">Contact</span>
    </div>
    <p>&copy; 2026 AffilixS</p>
</footer>

<script>
    async function init() {
        try {
            const res = await fetch("Data/products.json");
            const all = await res.json();
            const pId = new URLSearchParams(window.location.search).get('id');
            const p = all.find(x => x.id == pId) || all[0];

            document.getElementById("heroImage").src = p.image;
            document.getElementById("pName").innerText = p.name;
            document.getElementById("pDesc").innerText = p.fullDescription;
            document.getElementById("pPrice").innerText = (p.currency || "$") + p.price;
            document.getElementById("buyBtn").href = p.affiliateLink;

            const container = document.getElementById("productRowsContainer");
            const similar = all.filter(x => x.category === p.category && x.id !== p.id);

            if (similar.length > 0) {
                const rowId = "row-similar";
                const wrapper = document.createElement("div");
                wrapper.className = "similar-wrapper";
                wrapper.innerHTML = `<h2 style="font-size:1rem; margin-bottom:10px;">Similar Discoveries</h2>
                    <div class="horizontal-scroll" id="${rowId}"></div>
                    <button class="nav-arrow left" onclick="scrollX('${rowId}', -1)">❮</button>
                    <button class="nav-arrow right" onclick="scrollX('${rowId}', 1)">❯</button>`;
                container.appendChild(wrapper);
                const row = document.getElementById(rowId);
                similar.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "similar-item-card";
                    card.innerHTML = `<img src="${item.image}"><p>${item.shortName}</p>`;
                    card.onclick = () => { window.location.href = `product.html?id=${item.id}`; };
                    row.appendChild(card);
                });
            }
        } catch (e) { console.error(e); }
    }
    function scrollX(id, dir) { document.getElementById(id).scrollBy({ left: dir * 300, behavior: 'smooth' }); }
    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
