<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AffilixS | Premium Dashboard</title>
    <link rel="stylesheet" href="CSS/styles.css?v=1.5">
</head>
<body class="product-page">

    <header class="site-header">
        <div class="logo-group">
            <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
            <h1>AffilixS</h1>
        </div>
        <nav class="header-nav">
            <a href="index.html" style="text-decoration:none; color:#fff;"><span>HOME</span></a>
        </nav>
    </header>

    <main>
        <div class="main-display-area">
            <section class="hero-display">
                <img id="heroImage" src="" alt="Product Hero">
            </section>

            <section class="info-horizontal-bar">
                <div class="info-text-stack">
                    <h3 id="pShortName">---</h3>
                    <h1 id="pName">---</h1>
                    <p id="pDesc">---</p>
                </div>
                <div class="info-action-stack">
                    <div class="stat-row-item">Rating: <span class="stat-val-red" id="pRating">---</span></div>
                    <div class="stat-row-item">Trend: <span class="stat-val-red" id="pTrend">---</span></div>
                    <div class="stat-row-item">Price: <span class="stat-val-red" id="pPrice">---</span></div>
                    <div class="btn-row">
                        <a id="buyBtn" href="#" target="_blank" style="background:#ff0000; color:#fff; padding:10px; border-radius:4px; text-decoration:none; font-weight:bold; font-size:0.75rem; flex:1; text-align:center;">BUY NOW</a>
                        <button style="background:#444; color:#fff; border:none; padding:10px; border-radius:4px; cursor:pointer; font-size:0.75rem; flex:1;" onclick="window.location.href='index.html'">GO BACK</button>
                    </div>
                </div>
            </section>

            <h2 style="font-size:0.9rem; margin:10px 0 0 0;">SIMILAR DISCOVERIES</h2>
            <section class="horizontal-product-row" id="productRow"></section>
        </div>

        <aside class="category-sidebar">
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/cat-tech.jpg"><p>TECH</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/Home.jpg"><p>HOME</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/Fittness.jpg"><p>FITNESS</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/Style.jpg"><p>STYLE</p></div>
            <div class="sidebar-cat-card" onclick="window.location.href='index.html'"><img src="images/BeautyPersonnalCare.jpg"><p>BEAUTY</p></div>
        </aside>
    </main>

    <footer>
        <p class="copyright-text" style="padding-left:3ch; margin-top:20px;">&copy; 2026 AffilixS</p>
    </footer>

    <script>
        // ESC KEY TO HOME
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") window.location.href = 'index.html';
        });

        async function initDashboard() {
            try {
                const params = new URLSearchParams(window.location.search);
                let currentId = params.get('id');
                const res = await fetch("Data/products.json");
                const all = await res.json();

                function renderView(id) {
                    const p = all.find(x => x.id == id);
                    if(!p) return;

                    document.getElementById("heroImage").src = p.image;
                    document.getElementById("pShortName").innerText = p.shortName;
                    document.getElementById("pName").innerText = p.name;
                    document.getElementById("pDesc").innerText = p.fullDescription;
                    document.getElementById("pRating").innerText = p.rating || "4.8";
                    document.getElementById("pTrend").innerText = (p.trendScore || "95") + "%";
                    document.getElementById("pPrice").innerText = (p.currency || "$") + p.price;
                    document.getElementById("buyBtn").href = p.affiliateLink;

                    const similar = all.filter(x => x.category === p.category && x.id !== p.id);
                    const row = document.getElementById("productRow");
                    row.innerHTML = "";
                    similar.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "small-card";
                        card.onclick = () => { renderView(item.id); window.scrollTo(0,0); };
                        card.innerHTML = `<img src="${item.image}"><p>${item.shortName}</p>`;
                        row.appendChild(card);
                    });
                }
                renderView(currentId);
            } catch (e) { console.error(e); }
        }
        document.addEventListener("DOMContentLoaded", initDashboard);
    </script>
</body>
</html>
