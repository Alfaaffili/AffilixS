<header class="site-header">
    <div class="logo-group">
        <div class="logo"><img src="images/logo.jpg" alt="Logo"></div>
        <h1>AffilixS</h1>
    </div>
    <nav class="header-nav">
        <a href="index.html" class="nav-item home-link">home</a>
        <span class="nav-item" onclick="openM('visionModal')">vision</span>
        <span class="nav-item" onclick="openM('insightsModal')">insights</span>
        <span class="nav-item" onclick="openM('contactModal')">contact</span>
    </nav>
</header>

<main class="product-main-layout">
    <div class="main-display-area">
        <section class="hero-display">
            <img id="heroImage" src="" alt="Product Hero">
        </section>
        
        <section class="info-horizontal-bar">
            <div class="p-full-name"><b>FULL NAME:</b> <span id="pName">---</span></div>
            <div id="pDesc" class="p-description">---</div>
        </section>

        <div id="productRowsContainer"></div>
    </div>

    <aside class="master-sidebar">
        <div class="sidebar-action-col">
            <div class="tight-stats">
                <p><b>Rate:</b> ★★★★★</p>
                <p><b>Rank:</b> #1 Trend</p>
                <p class="price-val">Price: <span id="pPrice">---</span></p>
            </div>
            <div class="sidebar-btns">
                <a id="buyBtn" href="#" target="_blank" class="t-btn buy-now">BUY NOW</a>
                <button onclick="window.location.href='index.html'" class="t-btn go-back">GO BACK</button>
            </div>
        </div>

        <div class="sidebar-cat-col">
            <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/cat-tech.jpg"><p>TECH</p></div>
            <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/Home.jpg"><p>HOME</p></div>
            <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/Fittness.jpg"><p>FITNESS</p></div>
            <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/Style.jpg"><p>STYLE</p></div>
            <div class="cat-square" onclick="window.location.href='index.html'"><img src="images/BeautyPersonnalCare.jpg"><p>BEAUTY</p></div>
        </div>
    </aside>
</main>
